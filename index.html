<title>Jessika &amp; Milton · 26.09.2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --linho:#FBF8F3;
  --papel:#F3EDE3;
  --oliva:#5A6247;
  --oliva-claro:#8B9174;

  /* Tons de terra — mesma paleta do traje dos convidados */
  --camel:#C89D6E;
  --caramelo:#B97F4A;
  --terracota:#C56A44;
  --tijolo:#A55233;
  --argila:#8C4A2F;
  --cobre:#7A4A2E;
  --cacau:#5E3926;
  --cafe:#4A2E20;

  --terracota-claro:#DB9670;
  --tinta:#33261E;
  --tinta-suave:#6E5B4C;
  --linha:#E0D5C6;
  --ouro:#C9A961;
  --ouro-escuro:#9A7C3A;
  --erro:#A55233;
  --ok:#5A6247;
  --r:14px;
  --sombra:0 1px 2px rgba(51,38,30,.04), 0 8px 24px -12px rgba(51,38,30,.13);
  --sombra-alta:0 2px 4px rgba(51,38,30,.06), 0 20px 48px -16px rgba(51,38,30,.21);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--linho);
  color:var(--tinta);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
img{display:block;max-width:100%}
::selection{background:var(--terracota-claro);color:#fff}

/* ══ tipografia ══ */
.display{font-family:'Fraunces',Georgia,serif;font-weight:400;letter-spacing:-.01em;line-height:1.1}
.display-i{font-family:'Fraunces',Georgia,serif;font-style:italic;font-weight:300}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--oliva-claro);
}

/* ══ layout base ══ */
.shell{max-width:560px;margin:0 auto;min-height:100vh;background:var(--linho);position:relative;
  padding-bottom:calc(76px + env(safe-area-inset-bottom,0px));}
.pad{padding:0 20px}

/* ══ nav inferior ══ */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;z-index:80;
  background:rgba(251,248,243,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--linha);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-b{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:11px 2px 9px;color:var(--tinta-suave);position:relative;transition:color .18s;
}
.nav-b.on{color:var(--oliva)}
.nav-b.on::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:22px;height:2px;background:var(--terracota);border-radius:0 0 3px 3px;
}
.nav-b svg{width:20px;height:20px;stroke-width:1.6}
.nav-b span{font-size:9.5px;font-weight:500;letter-spacing:.02em}
.nav-dot{
  position:absolute;top:8px;right:calc(50% - 18px);
  width:6px;height:6px;border-radius:50%;background:var(--terracota);
}

/* ══ hero ══ */
.hero{
  padding:56px 20px 36px;text-align:center;position:relative;overflow:hidden;
  background:linear-gradient(178deg,var(--papel) 0%,var(--linho) 100%);
  border-bottom:1px solid var(--linha);
}
.hero-mono{
  font-size:11px;letter-spacing:.32em;color:var(--oliva-claro);margin-bottom:26px;
  font-weight:500;
}
.hero-nomes{font-size:clamp(38px,11vw,52px);color:var(--tinta);margin:0;line-height:1.02}
.hero-e{
  display:block;font-size:.46em;color:var(--terracota);margin:6px 0;
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
}
.hero-rule{
  width:44px;height:1px;background:var(--linha);margin:26px auto 20px;position:relative;
}
.hero-rule::after{
  content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:5px;height:5px;background:var(--terracota);
}
.hero-data{font-size:13px;color:var(--tinta-suave);letter-spacing:.04em;line-height:1.7}
.hero-data b{color:var(--tinta);font-weight:500}

/* ══ contador ══ */
.cd{display:flex;justify-content:center;gap:2px;margin-top:26px}
.cd-i{min-width:56px;text-align:center;padding:9px 4px}
.cd-n{font-size:24px;font-weight:500;color:var(--oliva);line-height:1}
.cd-l{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tinta-suave);margin-top:5px}
.cd-s{align-self:center;color:var(--linha);font-size:16px;padding-bottom:12px}

/* ══ cards ══ */
.card{
  background:#fff;border:1px solid var(--linha);border-radius:var(--r);
  box-shadow:var(--sombra);overflow:hidden;
}
.sec{padding:34px 0 8px}
.sec-t{font-size:23px;margin:0 0 5px}
.sec-d{font-size:13.5px;color:var(--tinta-suave);line-height:1.6;margin:0 0 20px}

/* ══ botões ══ */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px 20px;border-radius:11px;
  font-size:14.5px;font-weight:500;letter-spacing:.01em;
  transition:transform .12s,box-shadow .2s,background .2s;
}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none}
.btn-p{background:var(--oliva);color:#fff;box-shadow:0 4px 14px -6px rgba(90,98,71,.55)}
.btn-p:not(:disabled):hover{background:#4C543C}
.btn-t{background:var(--terracota);color:#fff;box-shadow:0 4px 14px -6px rgba(197,106,68,.5)}
.btn-t:not(:disabled):hover{background:var(--tijolo)}
.btn-o{background:transparent;color:var(--oliva);border:1px solid var(--linha)}
.btn-o:hover{background:var(--papel);border-color:var(--oliva-claro)}
.btn-g{background:var(--papel);color:var(--tinta)}
.btn-sm{padding:10px 15px;font-size:13px;width:auto;border-radius:9px}

/* ══ inputs ══ */
.fld{margin-bottom:15px}
.fld label{display:block;font-size:11px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--tinta-suave);margin-bottom:7px}
.inp{
  width:100%;padding:13px 15px;border:1px solid var(--linha);border-radius:10px;
  background:#fff;color:var(--tinta);transition:border-color .18s,box-shadow .18s;
}
.inp:focus{outline:none;border-color:var(--oliva-claro);box-shadow:0 0 0 3px rgba(139,145,116,.13)}
.inp::placeholder{color:#B8AFA1}
textarea.inp{resize:none;line-height:1.5}

/* ══ portão de entrada ══ */
.gate{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding:32px 24px;max-width:440px;margin:0 auto;
  background:linear-gradient(172deg,var(--papel) 0%,var(--linho) 62%);
}
.brasao{
  display:block;margin:0 auto;
  filter:drop-shadow(0 3px 10px rgba(51,38,30,.09));
}
.gate-mark{text-align:center;margin-bottom:34px}
.gate-mono{font-size:10px;letter-spacing:.34em;color:var(--oliva-claro);margin-bottom:20px;font-weight:600}
.gate-nomes{font-size:40px;line-height:1.05;color:var(--tinta);margin:0}
.gate-e{color:var(--terracota);font-family:'Fraunces',serif;font-style:italic;font-weight:300}
.gate-sub{font-size:12.5px;color:var(--tinta-suave);margin-top:16px;letter-spacing:.05em}

/* ══ PRESENTES ══ */
.termo{
  border:1px solid var(--linha);border-radius:var(--r);overflow:hidden;
  background:#fff;box-shadow:var(--sombra);margin-bottom:26px;
}
.termo-top{
  padding:22px 20px 18px;
  background:linear-gradient(145deg,#4C543C,#5A6247);
  color:#fff;
}
.termo-eyebrow{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.62);font-weight:600;margin-bottom:9px}
.termo-t{font-family:'Fraunces',serif;font-size:22px;font-weight:400;margin:0 0 4px;line-height:1.15}
.termo-sub{font-size:12px;color:rgba(255,255,255,.72);line-height:1.5}
.termo-bar-wrap{padding:18px 20px 20px;background:#fff}
.termo-nums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.termo-val{font-size:19px;font-weight:600;color:var(--oliva)}
.termo-alvo{font-size:12px;color:var(--tinta-suave)}
.termo-bar{height:7px;background:var(--papel);border-radius:99px;overflow:hidden}
.termo-fill{height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--oliva-claro),var(--oliva));
  transition:width 1.1s cubic-bezier(.22,1,.36,1)}
.termo-pct{font-size:11px;color:var(--tinta-suave);margin-top:9px;text-align:right;letter-spacing:.03em}

.pres-n{font-size:12.5px;font-weight:500;line-height:1.32;margin-bottom:auto;color:var(--tinta)}
.pres-v{font-size:14px;font-weight:600;color:var(--terracota);margin-top:9px}
.pres-v small{font-size:10px;font-weight:400;color:var(--tinta-suave);display:block;margin-top:2px}
.pres-chk{
  position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:50%;
  background:var(--terracota);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}

  position:absolute;top:9px;left:9px;padding:3px 8px;border-radius:99px;

}

}

  aspect-ratio:1/1.15;display:flex;flex-direction:column;justify-content:flex-end;
  padding:7px 6px;cursor:pointer;transition:transform .14s;
}
.paleta-c:active{transform:scale(.96)}
.paleta-n{font-size:9.5px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.paleta-h{font-size:8.5px;color:rgba(255,255,255,.78);margin-top:1px;
  font-family:'JetBrains Mono',monospace;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.paleta-c.claro .paleta-n{color:#4A2E20;text-shadow:none}
.paleta-c.claro .paleta-h{color:rgba(74,46,32,.62);text-shadow:none}

.social{
  display:flex;align-items:center;gap:4px;margin-top:7px;
  font-size:9.5px;color:var(--oliva-claro);letter-spacing:.02em;
}

.especial{
  grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:15px;

}

.especial.sel{box-shadow:0 0 0 2px rgba(201,169,97,.35)}
.especial-ic{

}
.especial-t{font-size:13.5px;font-weight:600;color:var(--tinta)}
.especial-d{font-size:11px;color:var(--tinta-suave);margin-top:2px;line-height:1.4}
.especial-v{margin-left:auto;font-size:15px;font-weight:600;color:#9A7C3A;flex-shrink:0}

.cart{
  position:fixed;bottom:calc(76px + env(safe-area-inset-bottom,0px));

}
@keyframes up{from{opacity:0;transform:translateX(-50%) translateY(14px)}}
.cart-i{flex:1;min-width:0}
.cart-c{font-size:10.5px;color:rgba(255,255,255,.6);letter-spacing:.05em}

}

.ov{
  position:fixed;inset:0;background:rgba(51,38,30,.52);backdrop-filter:blur(3px);

  animation:fade .22s;
}
@keyframes fade{from{opacity:0}}
.mod{
  background:var(--linho);width:100%;max-width:560px;
  border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;
  animation:slide .32s cubic-bezier(.22,1,.36,1);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
@keyframes slide{from{transform:translateY(100%)}}
.mod-h{
  padding:18px 20px 14px;border-bottom:1px solid var(--linha);
  display:flex;align-items:center;justify-content:between;gap:12px;
  position:sticky;top:0;background:var(--linho);z-index:2;
}
.mod-t{font-family:'Fraunces',serif;font-size:19px;font-weight:400;flex:1}
.mod-x{width:32px;height:32px;border-radius:50%;background:var(--papel);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tinta-suave)}
.mod-b{padding:20px}
.grab{width:34px;height:4px;background:var(--linha);border-radius:99px;margin:9px auto 0}

/* ══ pix ══ */
.qr-box{
  background:#fff;padding:18px;border-radius:var(--r);border:1px solid var(--linha);
  display:flex;justify-content:center;margin-bottom:16px;
}
.pix-code{
  background:#fff;border:1px solid var(--linha);border-radius:10px;padding:12px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;line-height:1.5;
  color:var(--tinta-suave);word-break:break-all;max-height:88px;overflow-y:auto;
  margin-bottom:10px;
}
.tot-box{
  background:var(--papel);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;
}
.tot-l{display:flex;justify-content:space-between;font-size:12.5px;
  color:var(--tinta-suave);padding:4px 0;line-height:1.5}
.tot-l b{color:var(--tinta);font-weight:500;text-align:right}
.tot-f{display:flex;justify-content:space-between;align-items:baseline;
  padding-top:12px;margin-top:10px;border-top:1px solid var(--linha)}
.tot-f span{font-size:12px;color:var(--tinta-suave)}
.tot-f b{font-size:22px;font-weight:600;color:var(--oliva)}

/* ══ chat ══ */
.chat-w{display:flex;flex-direction:column;height:calc(100vh - 76px - env(safe-area-inset-bottom,0px))}
.avisos{padding:12px 16px 0;flex-shrink:0}
.aviso{
  display:flex;gap:11px;padding:12px 14px;border-radius:11px;margin-bottom:8px;
  background:linear-gradient(120deg,#FDFBF6,#F8F2E4);border:1px solid var(--ouro);
}
.aviso-ic{color:var(--ouro);flex-shrink:0;margin-top:1px}
.aviso-t{font-size:12.5px;line-height:1.5;color:var(--tinta)}
.aviso-t b{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:#9A7C3A;margin-bottom:3px;font-weight:600}
.msgs{flex:1;overflow-y:auto;padding:14px 16px 8px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:9px;max-width:88%;align-items:flex-end}
.msg.eu{align-self:flex-end;flex-direction:row-reverse}
.av{
  width:29px;height:29px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#fff;
}
.bub{
  padding:9px 13px;border-radius:15px;font-size:14px;line-height:1.45;
  background:#fff;border:1px solid var(--linha);position:relative;
}
.msg.eu .bub{background:var(--oliva);color:#fff;border-color:var(--oliva)}
.bub-n{font-size:10.5px;font-weight:600;color:var(--oliva);margin-bottom:2px}
.bub-h{font-size:9.5px;color:var(--tinta-suave);margin-top:3px;text-align:right;opacity:.8}
.msg.eu .bub-h{color:rgba(255,255,255,.65)}
.chat-in{
  display:flex;gap:8px;padding:11px 16px;border-top:1px solid var(--linha);
  background:var(--linho);flex-shrink:0;align-items:flex-end;
}
.chat-in .inp{border-radius:20px;padding:11px 15px;max-height:96px}
.chat-s{
  width:42px;height:42px;border-radius:50%;background:var(--oliva);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-s:disabled{opacity:.35}
.del-m{opacity:0;transition:opacity .16s;font-size:10px;color:var(--erro);
  padding:0 5px;align-self:center}
.msg:hover .del-m{opacity:1}

.gal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.gal-i{
  aspect-ratio:1;object-fit:cover;width:100%;background:var(--papel);
  cursor:pointer;transition:opacity .18s;position:relative;
}
.gal-i:active{opacity:.75}
.gal-cell{position:relative;cursor:pointer}
.gal-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(46,42,36,.28);color:#fff;pointer-events:none;
}
.gal-au{

}

}
@keyframes sp{to{transform:rotate(360deg)}}

}

/* ── BR Code Pix (EMV) ── */
function pixBRCode(valor, txid='***'){
  const f=(id,v)=>id+String(v.length).padStart(2,'0')+v;
  const norm=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 $%*+\-./:]/g,'').toUpperCase();
  const mai=f('00','BR.GOV.BCB.PIX')+f('01',PIX.chave);
  let p='';
  p+=f('00','01');
  p+=f('26',mai);
  p+=f('52','0000');
  p+=f('53','986');
  if(valor>0) p+=f('54',valor.toFixed(2));
  p+=f('58','BR');
  p+=f('59',norm(PIX.nome).slice(0,25));
  p+=f('60',norm(PIX.cidade).slice(0,15));
  p+=f('62',f('05',txid.slice(0,25)));
  p+='6304';
  // CRC16-CCITT
  let crc=0xFFFF;
  for(let i=0;i<p.length;i++){
    crc^=p.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) crc = (crc&0x8000) ? ((crc<<1)^0x1021)&0xFFFF : (crc<<1)&0xFFFF;
  }
  return p+crc.toString(16).toUpperCase().padStart(4,'0');
}

/* ═════════════ APP ═════════════ */
function App(){
  const [uid,setUid] = useState(null);
  const [eu,setEu]   = useState(null);
  const [aba,setAba] = useState('casa');
  const [toast,setToast] = useState('');
  const [admin,setAdmin] = useState(false);
  const [forcarLogin,setForcarLogin] = useState(false);

  const [pedidos,setPedidos] = useState([]);
  const [msgs,setMsgs]       = useState([]);
  const [midias,setMidias]   = useState([]);
  const [avisos,setAvisos]   = useState([]);

  const aviso = useCallback(t=>{setToast(t);setTimeout(()=>setToast(''),2600)},[]);

  // Fluxo de autenticação. Um único ponto de decisão — sem corrida.
  //   URL termina em #noivos  → NÃO cria sessão anônima; mostra o login por e-mail.
  //   Sem #noivos             → convidado entra anônimo, como sempre.
  useEffect(()=>{
    const querNoivos = ()=> location.hash.toLowerCase()==='#noivos';

    // Se um convidado anônimo pediu #noivos, derruba a sessão dele primeiro.
    const u0 = auth.currentUser;
    if(querNoivos() && u0 && u0.isAnonymous) signOut(auth);

    const un = onAuthStateChanged(auth, async u=>{
      // ── ninguém logado ──
      if(!u){
        if(querNoivos()){                 // quer o login dos noivos: não cria anônimo
          setUid(null); setAdmin(false);
          setForcarLogin(true); setEu(false);
          return;
        }
        try{ await signInAnonymously(auth); }
        catch(e){ console.error(e); }
        return;
      }

      // ── convidado anônimo, mas a URL pede noivos: derruba ──
      if(u.isAnonymous && querNoivos()){ await signOut(auth); return; }

      const ehNoivo = NOIVOS_UID.includes(u.uid);

      // ── e-mail que NÃO está na lista de noivos: não é admin, barra ──
      if(!u.isAnonymous && !ehNoivo){
        await signOut(auth);
        setForcarLogin(true); setEu(false);
        return;
      }

      setUid(u.uid);
      setAdmin(ehNoivo);
      setForcarLogin(false);
      if(location.hash) history.replaceState(null,'',location.pathname);

      const snap = await getDoc(doc(db,C.convidados,u.uid));
      if(snap.exists()){
        setEu({uid:u.uid,...snap.data(),noivo:ehNoivo});
      } else if(ehNoivo){
        const nome = (u.email||'').toLowerCase().includes('jessika') ? 'Jessika' : 'Milton';
        const dado = {nome, fone:'', em:serverTimestamp()};
        await setDoc(doc(db,C.convidados,u.uid),dado);
        setEu({uid:u.uid,...dado,noivo:true});
      } else {
        setEu(false);                     // convidado novo: vai para o Gate
      }
    });

    // trocar o hash na barra de endereço recarrega o app no modo certo
    const onHash = ()=> location.reload();
    window.addEventListener('hashchange', onHash);
    return ()=>{ un(); window.removeEventListener('hashchange', onHash); };
  },[]);

  useEffect(()=>{
    if(!uid) return;
    const un=[];
    un.push(onSnapshot(collection(db,C.pedidos),s=>
      setPedidos(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.chat),orderBy('em','asc')),s=>
      setMsgs(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.galeria),orderBy('em','desc')),s=>
      setMidias(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.avisos),orderBy('em','desc')),s=>
      setAvisos(s.docs.map(d=>({id:d.id,...d.data()})))));
    return ()=>un.forEach(f=>f());
  },[uid]);

  // agregações de presentes
  const dados = useMemo(()=>{
    const confirmados = pedidos.filter(p=>p.status==='confirmado');
    const arrecadado  = confirmados.reduce((s,p)=>s+(p.total||0),0);
    const vezesDadas  = {};   // presente -> nº de pessoas que deram
    confirmados.forEach(p=>(p.itens||[]).forEach(i=>{
      vezesDadas[i.id]=(vezesDadas[i.id]||0)+1;
    }));
    return {arrecadado, vezesDadas, confirmados};
  },[pedidos]);

  if(eu===null) return h('div',{style:{minHeight:'100vh',display:'flex',
    alignItems:'center',justifyContent:'center'}},h('div',{className:'spin esc'}));

  if(eu===false) return h(Gate,{uid,abrirLogin:forcarLogin,
    onEntrar:async(nome,fone)=>{
    const dado={nome:nome.trim(),fone:fone.trim(),em:serverTimestamp()};
    await setDoc(doc(db,C.convidados,uid),dado);
    setEu({uid,...dado});
  }});

  const props = {eu,uid,admin,setAdmin,pedidos,msgs,midias,avisos,dados,aviso};

  return h('div',{className:'shell'},
    aba==='casa'  && h(Casa,{...props,setAba}),
    aba==='gift'  && h(Presentes,props),
    aba==='chat'  && h(Chat,props),
    aba==='foto'  && h(Galeria,props),
    aba==='local' && h(Local,props),
    h(Nav,{aba,setAba,nMsgs:msgs.length,nFotos:midias.length}),
    toast && h('div',{className:'toast'},toast)
  );
}

/* ═════════════ PORTÃO ═════════════ */
function Gate({onEntrar,abrirLogin}){
  const [nome,setNome]=useState('');
  const [fone,setFone]=useState('');
  const [busy,setBusy]=useState(false);
  const [login,setLogin]=useState(!!abrirLogin);
  const ok = nome.trim().length>2;
  useEffect(()=>{ if(abrirLogin) setLogin(true); },[abrirLogin]);

  const go=async()=>{
    if(!ok||busy) return;
    setBusy(true);
    try{ await onEntrar(nome,fone); }
    catch(e){ alert('Não foi possível entrar. Verifique sua conexão e tente de novo.'); setBusy(false); }
  };

  return h('div',{className:'gate'},
    h('div',{className:'gate-mark'},
      h('img',{className:'brasao',src:BRASAO,alt:'Brasão Jessika & Milton',
        width:132,height:132,style:{marginBottom:'22px'}}),
      h('h1',{className:'display gate-nomes'},
        'Jessika', h('br'), h('span',{className:'gate-e'},'&'), h('br'), 'Milton'),
      h('div',{className:'gate-sub'},'26 · 09 · 2026')
    ),
    h('div',{className:'card',style:{padding:'22px 20px'}},
      h('div',{style:{fontSize:'14px',lineHeight:1.6,color:'var(--tinta-suave)',marginBottom:'20px'}},
        'Que bom ter você aqui. Diga seu nome para entrar e a gente já sabe quem chegou.'),
      h('div',{className:'fld'},
        h('label',null,'Seu nome'),
        h('input',{className:'inp',value:nome,autoFocus:true,
          placeholder:'Nome e sobrenome',
          onChange:e=>setNome(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&go()})),
      h('div',{className:'fld'},
        h('label',null,'WhatsApp (opcional)'),
        h('input',{className:'inp',value:fone,type:'tel',
          placeholder:'(15) 99999-9999',
          onChange:e=>setFone(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&go()})),
      h('button',{className:'btn btn-p',disabled:!ok||busy,onClick:go},
        busy ? h('div',{className:'spin'}) : 'Entrar')
    ),
    h('div',{style:{textAlign:'center',marginTop:'22px'}},
      h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',lineHeight:1.6}},
        'Villa Vezzane · Mairiporã, SP'),
      h('button',{style:{fontSize:'11px',color:'var(--linha)',letterSpacing:'.1em',
        marginTop:'14px',padding:'6px'},
        onClick:()=>setLogin(true)},'· · ·')),

    login && h(LoginNoivos,{fechar:()=>setLogin(false)})
  );
}

/* ── login dos noivos (e-mail + senha) ── */
function LoginNoivos({fechar}){
  const [email,setEmail]=useState('');
  const [senha,setSenha]=useState('');
  const [busy,setBusy]=useState(false);
  const [erro,setErro]=useState('');
  const sair=()=>{
    if(location.hash.toLowerCase()==='#noivos'){
      location.href = location.pathname;   // volta a ser convidado
    } else {
      fechar();
    }
  };

  const entrar=async()=>{
    if(busy||!email.trim()||!senha) return;
    setBusy(true); setErro('');
    try{
      await signInWithEmailAndPassword(auth,email.trim(),senha);
      // onAuthStateChanged assume daqui
    }catch(e){
      setErro('E-mail ou senha não conferem.');
      setBusy(false);
    }
  };

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&sair()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},'Entrar como noivos'),
        h('button',{className:'mod-x',onClick:sair},h(Ic,{d:I.x,s:16}))),
      h('div',{className:'mod-b'},
        h('div',{className:'fld'},
          h('label',null,'E-mail'),
          h('input',{className:'inp',type:'email',value:email,autoFocus:true,
            autoComplete:'username',placeholder:'seu@email.com',
            onChange:e=>setEmail(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&entrar()})),
        h('div',{className:'fld'},
          h('label',null,'Senha'),
          h('input',{className:'inp',type:'password',value:senha,
            autoComplete:'current-password',placeholder:'••••••••',
            onChange:e=>setSenha(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&entrar()})),
        erro && h('div',{style:{fontSize:'12.5px',color:'var(--erro)',
          marginBottom:'12px',lineHeight:1.5}},erro),
        h('button',{className:'btn btn-p',disabled:busy,onClick:entrar},
          busy?h('div',{className:'spin'}):[h(Ic,{key:'i',d:I.lock,s:16}),'Entrar']),
        h('button',{className:'btn',style:{marginTop:'6px',color:'var(--tinta-suave)',
          fontSize:'12.5px'},onClick:()=>{
            location.href = location.pathname;   // limpa o #noivos e recarrega
          }},'Sou convidado, entrar normalmente'),
        h('p',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',textAlign:'center',
          marginTop:'12px',lineHeight:1.6}},
          'Área reservada aos noivos.')
      )));
}

/* ═════════════ CASA ═════════════ */
function Casa({eu,setAba,dados,midias}){
  const [t,setT]=useState({d:0,h:0,m:0,s:0});
  useEffect(()=>{
    const alvo=new Date(CASAMENTO.dataISO).getTime();
    const tick=()=>{
      const df=alvo-Date.now();
      if(df<=0){setT({d:0,h:0,m:0,s:0});return}
      setT({
        d:Math.floor(df/864e5),
        h:Math.floor(df/36e5)%24,
        m:Math.floor(df/6e4)%60,
        s:Math.floor(df/1e3)%60
      });
    };
    tick(); const iv=setInterval(tick,1000);
    return ()=>clearInterval(iv);
  },[]);

  const pct = Math.min(100,(dados.arrecadado/ALVO_LUA_MEL)*100);
  const primeiro = eu.nome.trim().split(/\s+/)[0];

  return h('div',null,
    h('div',{className:'hero'},
      h('img',{className:'brasao',src:BRASAO,alt:'',
        width:86,height:86,style:{marginBottom:'18px'}}),
      h('h1',{className:'display hero-nomes'},

      h('div',{className:'hero-data'},
        CASAMENTO.dataTxt, h('br'),
        h('b',null,CASAMENTO.hora + ' · ' + CASAMENTO.local)),
      h('div',{className:'cd'},
        h('div',{className:'cd-i'},
          h('div',{className:'cd-n mono'},t.d),

        h('div',{className:'cd-s'},'·'),
        h('div',{className:'cd-i'},
          h('div',{className:'cd-n mono'},String(t.h).padStart(2,'0')),
          h('div',{className:'cd-l'},'horas')),
        h('div',{className:'cd-s'},'·'),
        h('div',{className:'cd-i'},
          h('div',{className:'cd-n mono'},String(t.m).padStart(2,'0')),
          h('div',{className:'cd-l'},'min')),
        h('div',{className:'cd-s'},'·'),
        h('div',{className:'cd-i'},
          h('div',{className:'cd-n mono'},String(t.s).padStart(2,'0')),

    h('div',{className:'pad'},
      h('div',{className:'sec'},
        h('div',{className:'eyebrow',style:{marginBottom:'8px'}},'Olá, '+primeiro),
        h('h2',{className:'display sec-t'},'Você faz parte deste dia.'),

        h('div',{className:'termo-bar-wrap'},

  // Ilimitado: qualquer presente pode ser dado quantas vezes quiserem.

  const toggle = p =>
    setSel(s => s.find(x=>x.id===p.id) ? s.filter(x=>x.id!==p.id) : [...s,p]);
  const total = sel.reduce((s,p)=>s+p.valor,0);
  const pct   = Math.min(100,(dados.arrecadado/ALVO_LUA_MEL)*100);

  if(feito) return h(Obrigado,{pedido:feito,voltar:()=>{setFeito(null);setSel([])}});

  return h('div',null,
    h('div',{className:'pad'},
      h('div',{className:'sec'},
        h('div',{className:'eyebrow',style:{marginBottom:'8px'}},'Lista de presentes'),
        h('h2',{className:'display sec-t'},'Presenteie um dia da nossa viagem.'),

      h('div',{className:'termo'},

          h('div',{className:'termo-sub'},'Bangkok · Ayutthaya · Chiang Mai · Phuket · Krabi · Koh Samui')),
        h('div',{className:'termo-bar-wrap'},
          h('div',{className:'termo-nums'},
            h('span',{className:'termo-val mono'},brl(dados.arrecadado)),
            h('span',{className:'termo-alvo mono'},'de '+brl(ALVO_LUA_MEL))),
          h('div',{className:'termo-bar'},
            h('div',{className:'termo-fill',style:{width:pct+'%'}})),

      h('div',{className:'grid',style:{marginBottom:'26px'}},

                h('small',null,p.sub)),

                h('span',null, vezes===1
                  ? '1 pessoa já presenteou'
                  : vezes+' pessoas já presentearam'))
            ));
        }),

        ESPECIAIS.map(p=>{
          const on = !!sel.find(x=>x.id===p.id);
          const vezes = dados.vezesDadas[p.id]||0;
          return h('div',{key:p.id,className:'especial'+(on?' sel':''),

              h('div',{className:'especial-d'},p.desc),

  const enviar=async()=>{
    const t=txt.trim();
    if(!t||busy) return;
    setBusy(true); setTxt('');

      await addDoc(collection(db,C.chat),{
        uid, nome:eu.nome, txt:t.slice(0,600), em:serverTimestamp()

    h('div',{className:'msgs'},
      msgs.length===0 && h('div',{className:'vazio'},

        h('div',{className:'vazio-t'},'Ninguém falou nada ainda'),
        h('div',{className:'vazio-d'},'Este é o espaço dos convidados. Diga oi, combine carona, pergunte o que quiser.')),

      msgs.map(m=>{
        const meu = m.uid===uid;
        return h('div',{key:m.id,className:'msg'+(meu?' eu':'')},
          !meu && h('div',{className:'av',style:{background:corDe(m.nome)}},iniciais(m.nome)),

          e.target.style.height='auto';
          e.target.style.height=Math.min(e.target.scrollHeight,96)+'px';

        onKeyDown:e=>{
          if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();
            e.target.style.height='auto';}

      h('button',{className:'chat-s',disabled:!txt.trim()||busy,onClick:enviar},
        busy?h('div',{className:'spin'}):h(Ic,{d:I.send,s:17})))
  );

/* ═════════════ GALERIA ═════════════ */
function Galeria({eu,uid,midias,admin,aviso}){
  const [busy,setBusy]=useState(false);
  const [prog,setProg]=useState(0);
  const [lb,setLb]=useState(null);
  const inp=useRef(null);

  const configurado = CLOUDINARY.cloudName && CLOUDINARY.uploadPreset;

  const subir = async e => {
    const arqs=[...e.target.files];
    if(!arqs.length) return;
    if(!configurado){ aviso('Álbum ainda não está ativo.'); return; }
    setBusy(true); setProg(0);
    let n=0;
    for(const a of arqs){
      try{
        const fd=new FormData();
        fd.append('file',a);
        fd.append('upload_preset',CLOUDINARY.uploadPreset);
        const tipo = a.type.startsWith('video')?'video':'image';
        const r=await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/${tipo}/upload`,
          {method:'POST',body:fd});
        const j=await r.json();
        if(!j.secure_url) throw new Error(j.error?.message||'upload falhou');
        await addDoc(collection(db,C.galeria),{
          uid, nome:eu.nome, url:j.secure_url,
          thumb: tipo==='video'
            ? j.secure_url.replace('/upload/','/upload/so_0,w_400,h_400,c_fill/').replace(/\.\w+$/,'.jpg')
            : j.secure_url.replace('/upload/','/upload/w_400,h_400,c_fill,q_auto/'),
          tipo, pid:j.public_id, em:serverTimestamp()
        });
      }catch(err){ console.error(err); }
      n++; setProg(Math.round(n/arqs.length*100));
    }
    setBusy(false); setProg(0);
    e.target.value='';
    aviso(arqs.length===1?'Foto no álbum':arqs.length+' arquivos no álbum');
  };

  const apagar=async m=>{
    if(!confirm('Remover do álbum?')) return;
    await deleteDoc(doc(db,C.galeria,m.id));
    setLb(null);
  };

  return h('div',null,
    h('div',{className:'pad'},
      h('div',{className:'sec'},
        h('div',{className:'eyebrow',style:{marginBottom:'8px'}},'Álbum coletivo'),
        h('h2',{className:'display sec-t'},'O casamento pelos seus olhos.'),
        h('p',{className:'sec-d'},
          'Tire fotos, grave vídeos, e mande tudo para cá. Todo mundo vê na hora — ',
          'e nós ficamos com o registro completo do nosso dia.')),

      h('input',{ref:inp,type:'file',accept:'image/*,video/*',multiple:true,
        style:{display:'none'},onChange:subir}),

      h('button',{className:'up-btn',disabled:busy,onClick:()=>inp.current.click()},
        busy
          ? [h('div',{key:'s',className:'spin esc'}),
             h('span',{key:'t'},'Enviando… '+prog+'%')]
          : [h(Ic,{key:'i',d:I.up,s:20}),
             h('span',{key:'t'},'Adicionar fotos e vídeos')])
    ),

    midias.length===0
      ? h('div',{className:'vazio'},
          h('div',{className:'vazio-ic'},h(Ic,{d:I.foto,s:38})),
          h('div',{className:'vazio-t'},'O álbum começa com você'),
          h('div',{className:'vazio-d'},'Nada aqui ainda. A primeira foto pode ser a sua.'))
      : h('div',{className:'gal-grid'},
          midias.map(m=>h('div',{key:m.id,className:'gal-cell',onClick:()=>setLb(m)},
            h('img',{className:'gal-i',src:m.thumb||m.url,alt:'',loading:'lazy'}),
            m.tipo==='video' && h('div',{className:'gal-play'},h(Ic,{d:I.play,s:24,f:'currentColor'})),
            h('div',{className:'gal-au'},m.nome.split(/\s+/)[0])))),

    h('div',{style:{height:'40px'}}),

    lb && h('div',{className:'lb',onClick:e=>e.target===e.currentTarget&&setLb(null)},
      h('button',{className:'lb-x',onClick:()=>setLb(null)},h(Ic,{d:I.x,s:17})),
      lb.tipo==='video'
        ? h('video',{src:lb.url,controls:true,autoPlay:true,playsInline:true})
        : h('img',{src:lb.url,alt:''}),
      h('div',{className:'lb-i'},
        'Enviado por '+lb.nome,
        (admin||lb.uid===uid) && h('button',{
          style:{display:'block',margin:'10px auto 0',color:'#E08A6E',fontSize:'12px'},
          onClick:()=>apagar(lb)},'Remover')))
  );
}

        h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),

      h('div',{className:'mod-b'},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'11px',marginBottom:'22px'}},
          h('div',{className:'card',style:{padding:'15px'}},
            h('div',{className:'eyebrow'},'Confirmado'),
            h('div',{className:'mono',style:{fontSize:'19px',fontWeight:600,
              color:'var(--oliva)',marginTop:'5px'}},brl(dados.arrecadado))),
          h('div',{className:'card',style:{padding:'15px'}},
            h('div',{className:'eyebrow'},'Aguardando'),
            h('div',{className:'mono',style:{fontSize:'19px',fontWeight:600,
              color:'var(--terracota)',marginTop:'5px'}},brl(pendTotal)))),

        h('div',{className:'card',style:{padding:'16px',marginBottom:'22px'}},
          h('div',{className:'eyebrow',style:{marginBottom:'9px'}},'Publicar recado no chat'),
          h('textarea',{className:'inp',rows:2,value:novoAviso,
            placeholder:'Ex: O portão abre às 15h. Estacionamento gratuito no local.',
            onChange:e=>setNovoAviso(e.target.value),
            style:{marginBottom:'10px'}}),
          h('button',{className:'btn btn-p btn-sm',disabled:!novoAviso.trim(),
            onClick:publicar,style:{width:'100%'}},'Publicar para todos')),

        h('div',{className:'tabs'},
          [['pendente','Aguardando '+pend.length],
           ['confirmado','Confirmados'],
           ['todos','Todos']].map(([k,l])=>
            h('button',{key:k,className:'tab'+(tab===k?' on':''),
              onClick:()=>setTab(k)},l))),

        h('div',{className:'card'},
          lista.length===0
            ? h('div',{style:{padding:'34px 20px',textAlign:'center',
                color:'var(--tinta-suave)',fontSize:'13px'}},'Nada aqui.')
            : lista.map(p=>h('div',{key:p.id,className:'ped'},
                h('div',{className:'ped-i'},
                  h('div',{className:'ped-n'},p.nome),
                  h('div',{className:'ped-d'},
                    (p.itens||[]).map(i=>i.nome).join(' · ')),
                  h('div',{className:'badge '+(p.status==='confirmado'?'conf':'pend')},
                    (p.forma==='pix'?'Pix':'Cartão')+' · '+
                    (p.status==='confirmado'?'Confirmado':'Aguardando'))),
                h('div',{style:{textAlign:'right',flexShrink:0}},
                  h('div',{className:'ped-v mono'},brl(p.total)),
                  h('button',{className:'btn btn-sm '+(p.status==='confirmado'?'btn-o':'btn-p'),
                    style:{marginTop:'7px',fontSize:'11px',padding:'6px 11px'},
                    onClick:()=>mudar(p,p.status==='confirmado'?'pendente':'confirmado')},
                    p.status==='confirmado'?'Desfazer':'Confirmar'))))),
        h('div',{style:{height:'20px'}}))
    ));
}

/* ═════════════ NAV ═════════════ */
function Nav({aba,setAba,nMsgs,nFotos}){
  const abas=[
    ['casa', I.casa, 'Início'],
    ['gift', I.gift, 'Presentes'],
    ['chat', I.chat, 'Conversa'],
    ['foto', I.foto, 'Álbum'],
    ['local',I.pin,  'Local']
  ];
  return h('nav',{className:'nav'},
    abas.map(([k,ic,l])=>
      h('button',{key:k,className:'nav-b'+(aba===k?' on':''),onClick:()=>setAba(k)},
        h(Ic,{d:ic,s:20}),
        h('span',null,l))));
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
