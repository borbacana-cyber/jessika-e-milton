<title>Jessika &amp; Milton · 26.09.2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..600,0..100,0..1;1,9..144,300..600,0..100,0..1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --linho:#FBF8F3;
  --papel:#F3EDE3;
  --oliva:#5A6247;
  --oliva-claro:#8B9174;

  /* Tons de terra — mesma paleta do traje dos convidados */
  --camel:#C89D6E;
  --caramelo:#B97F4A;
  --terracota:#C56A44;
  --tijolo:#A55233;
  --argila:#8C4A2F;
  --cobre:#7A4A2E;
  --cacau:#5E3926;
  --cafe:#4A2E20;

  --terracota-claro:#DB9670;
  --tinta:#33261E;
  --tinta-suave:#6E5B4C;
  --linha:#E0D5C6;
  --ouro:#C9A961;
  --ouro-escuro:#9A7C3A;
  --erro:#A55233;
  --ok:#5A6247;
  --r:14px;
  --sombra:0 1px 2px rgba(51,38,30,.04), 0 8px 24px -12px rgba(51,38,30,.13);
  --sombra-alta:0 2px 4px rgba(51,38,30,.06), 0 20px 48px -16px rgba(51,38,30,.21);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--linho);
  color:var(--tinta);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
img{display:block;max-width:100%}
::selection{background:var(--terracota-claro);color:#fff}

/* ══ tipografia ══ */
.display{
  font-family:'Fraunces',Georgia,serif;font-weight:400;
  letter-spacing:-.01em;line-height:1.1;
  /* WONK 0 desliga os glifos alternativos do Fraunces (o "J" e o "ss"
     de Jessika saíam com desenhos decorativos que pareciam dobrados) */
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;
  -webkit-font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"hlig" 0,"calt" 0;
  font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"hlig" 0,"calt" 0;
}
.display-i{
  font-family:'Fraunces',Georgia,serif;font-style:italic;font-weight:300;
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;
  font-feature-settings:"liga" 0,"clig" 0,"dlig" 0;
}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--oliva-claro);
}

/* ══ layout base ══ */
.shell{max-width:560px;margin:0 auto;min-height:100vh;background:var(--linho);position:relative;
  padding-bottom:calc(76px + env(safe-area-inset-bottom,0px));}
.pad{padding:0 20px}

/* ══ nav inferior ══ */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;z-index:80;
  background:rgba(251,248,243,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--linha);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-b{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:11px 2px 9px;color:var(--tinta-suave);position:relative;transition:color .18s;
}
.nav-b.on{color:var(--oliva)}
.nav-b.on::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:22px;height:2px;background:var(--terracota);border-radius:0 0 3px 3px;
}
.nav-b svg{width:20px;height:20px;stroke-width:1.6}
.nav-b span{font-size:9.5px;font-weight:500;letter-spacing:.02em}
.nav-dot{
  position:absolute;top:8px;right:calc(50% - 18px);
  width:6px;height:6px;border-radius:50%;background:var(--terracota);
}

/* ══ hero ══ */
.hero{
  padding:56px 20px 36px;text-align:center;position:relative;overflow:hidden;
  background:linear-gradient(178deg,var(--papel) 0%,var(--linho) 100%);
  border-bottom:1px solid var(--linha);
}
.hero-mono{
  font-size:11px;letter-spacing:.32em;color:var(--oliva-claro);margin-bottom:26px;
  font-weight:500;
}
.hero-nomes{
  font-size:clamp(38px,11vw,52px);color:var(--tinta);margin:0;line-height:1.02;
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"calt" 0;
}
.hero-e{
  display:block;font-size:.46em;color:var(--terracota);margin:6px 0;
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
}
.hero-rule{
  width:44px;height:1px;background:var(--linha);margin:26px auto 20px;position:relative;
}
.hero-rule::after{
  content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%) rotate(45deg);
  width:5px;height:5px;background:var(--terracota);
}
.hero-data{font-size:13px;color:var(--tinta-suave);letter-spacing:.04em;line-height:1.7}
.hero-data b{color:var(--tinta);font-weight:500}

/* ══ contador ══ */
.cd{display:flex;justify-content:center;gap:2px;margin-top:26px}
.cd-i{min-width:56px;text-align:center;padding:9px 4px}
.cd-n{font-size:24px;font-weight:500;color:var(--oliva);line-height:1}
.cd-l{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tinta-suave);margin-top:5px}
.cd-s{align-self:center;color:var(--linha);font-size:16px;padding-bottom:12px}

/* ══ cards ══ */
.card{
  background:#fff;border:1px solid var(--linha);border-radius:var(--r);
  box-shadow:var(--sombra);overflow:hidden;
}
.sec{padding:34px 0 8px}
.sec-t{font-size:23px;margin:0 0 5px}
.sec-d{font-size:13.5px;color:var(--tinta-suave);line-height:1.6;margin:0 0 20px}

/* ══ botões ══ */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px 20px;border-radius:11px;
  font-size:14.5px;font-weight:500;letter-spacing:.01em;
  transition:transform .12s,box-shadow .2s,background .2s;
}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none}
.btn-p{background:var(--oliva);color:#fff;box-shadow:0 4px 14px -6px rgba(90,98,71,.55)}
.btn-p:not(:disabled):hover{background:#4C543C}
.btn-t{background:var(--terracota);color:#fff;box-shadow:0 4px 14px -6px rgba(197,106,68,.5)}
.btn-t:not(:disabled):hover{background:var(--tijolo)}
.btn-o{background:transparent;color:var(--oliva);border:1px solid var(--linha)}
.btn-o:hover{background:var(--papel);border-color:var(--oliva-claro)}
.btn-g{background:var(--papel);color:var(--tinta)}
.btn-sm{padding:10px 15px;font-size:13px;width:auto;border-radius:9px}

/* ══ inputs ══ */
.fld{margin-bottom:15px}
.fld label{display:block;font-size:11px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--tinta-suave);margin-bottom:7px}
.inp{
  width:100%;padding:13px 15px;border:1px solid var(--linha);border-radius:10px;
  background:#fff;color:var(--tinta);transition:border-color .18s,box-shadow .18s;
}
.inp:focus{outline:none;border-color:var(--oliva-claro);box-shadow:0 0 0 3px rgba(139,145,116,.13)}
.inp::placeholder{color:#B8AFA1}
textarea.inp{resize:none;line-height:1.5}

/* ══ portão de entrada ══ */
.gate{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding:32px 24px;max-width:440px;margin:0 auto;
  background:linear-gradient(172deg,var(--papel) 0%,var(--linho) 62%);
}
.brasao{
  display:block;margin:0 auto;
  filter:drop-shadow(0 3px 10px rgba(51,38,30,.09));
}
.gate-mark{text-align:center;margin-bottom:34px}
.gate-mono{font-size:10px;letter-spacing:.34em;color:var(--oliva-claro);margin-bottom:20px;font-weight:600}
.gate-nomes{
  font-size:40px;line-height:1.05;color:var(--tinta);margin:0;
  font-variation-settings:"SOFT" 0,"WONK" 0;
  font-variant-ligatures:none;font-feature-settings:"liga" 0,"clig" 0,"dlig" 0,"calt" 0;
}
.gate-e{color:var(--terracota);font-family:'Fraunces',serif;font-style:italic;font-weight:300}
.gate-sub{font-size:12.5px;color:var(--tinta-suave);margin-top:16px;letter-spacing:.05em}

/* ══ PRESENTES ══ */
.termo{
  border:1px solid var(--linha);border-radius:var(--r);overflow:hidden;
  background:#fff;box-shadow:var(--sombra);margin-bottom:26px;
}
.termo-top{
  padding:22px 20px 18px;
  background:linear-gradient(145deg,#4C543C,#5A6247);
  color:#fff;
}
.termo-eyebrow{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.62);font-weight:600;margin-bottom:9px}
.termo-t{font-family:'Fraunces',serif;font-size:22px;font-weight:400;margin:0 0 4px;line-height:1.15}
.termo-sub{font-size:12px;color:rgba(255,255,255,.72);line-height:1.5}
.termo-bar-wrap{padding:18px 20px 20px;background:#fff}
.termo-nums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.termo-val{font-size:19px;font-weight:600;color:var(--oliva)}

.termo-bar{height:7px;background:var(--papel);border-radius:99px;overflow:hidden}
.termo-fill{height:100%;border-radius:99px;

.termo-pct{font-size:11px;color:var(--tinta-suave);margin-top:9px;text-align:right;letter-spacing:.03em}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.pres{
  border:1px solid var(--linha);border-radius:var(--r);overflow:hidden;background:#fff;

}
.pres:active{transform:scale(.982)}
.pres.sel{border-color:var(--terracota);box-shadow:0 0 0 2px rgba(197,106,68,.18),var(--sombra)}

.pres-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--papel)}
.pres-b{padding:11px 12px 13px;display:flex;flex-direction:column;flex:1}
.pres-n{font-size:12.5px;font-weight:500;line-height:1.32;margin-bottom:auto;color:var(--tinta)}
.pres-v{font-size:14px;font-weight:600;color:var(--terracota);margin-top:9px}
.pres-v small{font-size:10px;font-weight:400;color:var(--tinta-suave);display:block;margin-top:2px}
.pres-chk{
  position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:50%;
  background:var(--terracota);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.pres-tag{
  position:absolute;top:9px;left:9px;padding:3px 8px;border-radius:99px;
  font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(51,38,30,.74);color:#fff;backdrop-filter:blur(4px);
}
.paleta{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  border-radius:11px;overflow:hidden;border:1px solid var(--linha);
}
.paleta-c{
  aspect-ratio:1/1.15;display:flex;flex-direction:column;justify-content:flex-end;
  padding:7px 6px;cursor:pointer;transition:transform .14s;
}
.paleta-c:active{transform:scale(.96)}
.paleta-n{font-size:9.5px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.paleta-h{font-size:8.5px;color:rgba(255,255,255,.78);margin-top:1px;
  font-family:'JetBrains Mono',monospace;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.paleta-c.claro .paleta-n{color:#4A2E20;text-shadow:none}
.paleta-c.claro .paleta-h{color:rgba(74,46,32,.62);text-shadow:none}

.contador{
  display:flex;align-items:center;justify-content:center;gap:20px;
  background:#fff;border:1px solid var(--linha);border-radius:13px;padding:14px;
}
.cont-b{
  width:44px;height:44px;border-radius:50%;background:var(--papel);
  font-size:22px;font-weight:500;color:var(--tinta);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .12s;
}
.cont-b:not(:disabled):hover{background:var(--linha)}
.cont-b:not(:disabled):active{transform:scale(.92)}
.cont-b:disabled{opacity:.32;cursor:not-allowed}
.cont-v{min-width:74px;text-align:center}
.cont-n{font-size:30px;font-weight:600;color:var(--oliva);line-height:1}
.cont-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--tinta-suave);margin-top:4px}

.ess{
  border:1px solid var(--linha);border-radius:var(--r);overflow:hidden;background:#fff;
  cursor:pointer;transition:transform .16s,box-shadow .22s,border-color .18s;
  position:relative;display:flex;gap:0;margin-bottom:11px;box-shadow:var(--sombra);
}
.ess:active{transform:scale(.988)}
.ess.sel{border-color:var(--terracota);box-shadow:0 0 0 2px rgba(197,106,68,.18),var(--sombra)}
.ess.full{opacity:.62;pointer-events:none}
.ess-img{width:104px;flex-shrink:0;object-fit:cover;background:var(--papel)}
.ess-b{padding:12px 13px;flex:1;min-width:0;display:flex;flex-direction:column}
.ess-n{font-size:14px;font-weight:600;color:var(--tinta);line-height:1.25}
.ess-s{font-size:11px;color:var(--tinta-suave);margin-top:2px;line-height:1.4}
.ess-bar{height:5px;background:var(--papel);border-radius:99px;overflow:hidden;margin-top:10px}
.ess-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1);
  background:linear-gradient(90deg,var(--camel),var(--terracota))}
.ess-f{display:flex;justify-content:space-between;align-items:baseline;margin-top:7px;gap:8px}
.ess-c{font-size:10.5px;color:var(--tinta-suave);letter-spacing:.02em}
.ess-v{font-size:13.5px;font-weight:600;color:var(--terracota);white-space:nowrap}
.ess-v small{font-weight:400;color:var(--tinta-suave);font-size:9.5px}
.ess-tag{
  position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:99px;
  font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  background:var(--oliva);color:#fff;
}
.sub-t{
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--tinta-suave);margin:26px 0 12px;display:flex;align-items:center;gap:10px;
}
.sub-t::after{content:'';flex:1;height:1px;background:var(--linha)}

.social{
  display:flex;align-items:center;gap:4px;margin-top:7px;
  font-size:9.5px;color:var(--oliva-claro);letter-spacing:.02em;
}
.social svg{flex-shrink:0;stroke-width:2}

.especial{
  grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:15px;
  border:1px solid var(--ouro);border-radius:var(--r);background:linear-gradient(120deg,#FDFBF6,#F8F2E4);
  cursor:pointer;transition:transform .16s,box-shadow .2s;position:relative;
}
.especial:active{transform:scale(.985)}
.especial.sel{box-shadow:0 0 0 2px rgba(201,169,97,.35)}
.especial-ic{
  width:40px;height:40px;border-radius:11px;background:var(--ouro);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.especial-t{font-size:13.5px;font-weight:600;color:var(--tinta)}
.especial-d{font-size:11px;color:var(--tinta-suave);margin-top:2px;line-height:1.4}
.especial-v{margin-left:auto;font-size:15px;font-weight:600;color:#9A7C3A;flex-shrink:0}

/* ══ carrinho flutuante ══ */
.cart{
  position:fixed;bottom:calc(76px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:528px;z-index:70;
  background:var(--tinta);color:#fff;border-radius:13px;padding:13px 16px;
  display:flex;align-items:center;gap:13px;
  box-shadow:0 12px 32px -8px rgba(51,38,30,.44);
  animation:up .3s cubic-bezier(.22,1,.36,1);
}
@keyframes up{from{opacity:0;transform:translateX(-50%) translateY(14px)}}
.cart-i{flex:1;min-width:0}
.cart-c{font-size:10.5px;color:rgba(255,255,255,.6);letter-spacing:.05em}
.cart-v{font-size:19px;font-weight:600;margin-top:1px}
.cart-b{
  background:var(--terracota);color:#fff;padding:11px 18px;border-radius:9px;
  font-size:13.5px;font-weight:600;flex-shrink:0;
}

/* ══ modal ══ */
.ov{
  position:fixed;inset:0;background:rgba(51,38,30,.52);backdrop-filter:blur(3px);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  animation:fade .22s;
}
@keyframes fade{from{opacity:0}}
.mod{
  background:var(--linho);width:100%;max-width:560px;
  border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;
  animation:slide .32s cubic-bezier(.22,1,.36,1);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
@keyframes slide{from{transform:translateY(100%)}}
.mod-h{
  padding:18px 20px 14px;border-bottom:1px solid var(--linha);
  display:flex;align-items:center;justify-content:between;gap:12px;
  position:sticky;top:0;background:var(--linho);z-index:2;
}
.mod-t{font-family:'Fraunces',serif;font-size:19px;font-weight:400;flex:1}
.mod-x{width:32px;height:32px;border-radius:50%;background:var(--papel);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tinta-suave)}
.mod-b{padding:20px}
.grab{width:34px;height:4px;background:var(--linha);border-radius:99px;margin:9px auto 0}

/* ══ pix ══ */
.qr-box{
  background:#fff;padding:18px;border-radius:var(--r);border:1px solid var(--linha);
  display:flex;justify-content:center;margin-bottom:16px;
}
.pix-code{
  background:#fff;border:1px solid var(--linha);border-radius:10px;padding:12px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;line-height:1.5;
  color:var(--tinta-suave);word-break:break-all;max-height:88px;overflow-y:auto;
  margin-bottom:10px;
}
.tot-box{
  background:var(--papel);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;
}
.tot-l{display:flex;justify-content:space-between;font-size:12.5px;
  color:var(--tinta-suave);padding:4px 0;line-height:1.5}
.tot-l b{color:var(--tinta);font-weight:500;text-align:right}
.tot-f{display:flex;justify-content:space-between;align-items:baseline;
  padding-top:12px;margin-top:10px;border-top:1px solid var(--linha)}
.tot-f span{font-size:12px;color:var(--tinta-suave)}
.tot-f b{font-size:22px;font-weight:600;color:var(--oliva)}

/* ══ chat ══ */
.chat-w{display:flex;flex-direction:column;height:calc(100vh - 76px - env(safe-area-inset-bottom,0px))}
.avisos{padding:12px 16px 0;flex-shrink:0}
.aviso{
  display:flex;gap:11px;padding:12px 14px;border-radius:11px;margin-bottom:8px;
  background:linear-gradient(120deg,#FDFBF6,#F8F2E4);border:1px solid var(--ouro);
}
.aviso-ic{color:var(--ouro);flex-shrink:0;margin-top:1px}
.aviso-t{font-size:12.5px;line-height:1.5;color:var(--tinta)}
.aviso-t b{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:#9A7C3A;margin-bottom:3px;font-weight:600}
.msgs{flex:1;overflow-y:auto;padding:14px 16px 8px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:9px;max-width:88%;align-items:flex-end}
.msg.eu{align-self:flex-end;flex-direction:row-reverse}
.av{
  width:29px;height:29px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#fff;
}
.bub{
  padding:9px 13px;border-radius:15px;font-size:14px;line-height:1.45;
  background:#fff;border:1px solid var(--linha);position:relative;
}
.msg.eu .bub{background:var(--oliva);color:#fff;border-color:var(--oliva)}
.bub-n{font-size:10.5px;font-weight:600;color:var(--oliva);margin-bottom:2px}
.bub-h{font-size:9.5px;color:var(--tinta-suave);margin-top:3px;text-align:right;opacity:.8}
.msg.eu .bub-h{color:rgba(255,255,255,.65)}
.chat-in{
  display:flex;gap:8px;padding:11px 16px;border-top:1px solid var(--linha);
  background:var(--linho);flex-shrink:0;align-items:flex-end;
}
.chat-in .inp{border-radius:20px;padding:11px 15px;max-height:96px}
.chat-s{
  width:42px;height:42px;border-radius:50%;background:var(--oliva);color:#fff;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-s:disabled{opacity:.35}
.del-m{opacity:0;transition:opacity .16s;font-size:10px;color:var(--erro);
  padding:0 5px;align-self:center}
.msg:hover .del-m{opacity:1}

/* ══ galeria ══ */
.gal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.gal-i{
  aspect-ratio:1;object-fit:cover;width:100%;background:var(--papel);
  cursor:pointer;transition:opacity .18s;position:relative;
}
.gal-i:active{opacity:.75}
.gal-cell{position:relative;cursor:pointer}
.gal-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(46,42,36,.28);color:#fff;pointer-events:none;
}
.gal-au{
  position:absolute;bottom:4px;left:5px;font-size:9px;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.7);pointer-events:none;font-weight:500;
}
.up-btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:22px;border:1.5px dashed var(--linha);border-radius:var(--r);
  background:#fff;color:var(--oliva);font-size:14px;font-weight:500;
  width:100%;transition:border-color .18s,background .18s;margin-bottom:18px;
}
.up-btn:hover{border-color:var(--oliva-claro);background:var(--papel)}
.lb{
  position:fixed;inset:0;background:rgba(20,18,15,.94);z-index:300;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  animation:fade .2s;
}
.lb img,.lb video{max-width:100%;max-height:84vh;object-fit:contain}
.lb-x{position:absolute;top:calc(14px + env(safe-area-inset-top,0px));right:16px;
  width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.14);
  color:#fff;display:flex;align-items:center;justify-content:center;z-index:2}
.lb-i{position:absolute;bottom:calc(22px + env(safe-area-inset-bottom,0px));left:0;right:0;
  text-align:center;color:rgba(255,255,255,.8);font-size:12.5px}

/* ══ local ══ */
.mapa{width:100%;aspect-ratio:16/10;border:0;display:block;background:var(--papel)}
.info-l{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--linha)}
.info-l:last-child{border-bottom:none}
.info-ic{
  width:36px;height:36px;border-radius:10px;background:var(--papel);color:var(--oliva);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.info-t{font-size:10px;letter-spacing:.11em;text-transform:uppercase;
  color:var(--tinta-suave);font-weight:600;margin-bottom:3px}
.info-v{font-size:14px;color:var(--tinta);line-height:1.5}
.info-v a{color:var(--terracota);text-decoration:none;font-weight:500}

/* ══ diversos ══ */
.vazio{text-align:center;padding:52px 24px;color:var(--tinta-suave)}
.vazio-ic{color:var(--linha);margin-bottom:14px}
.vazio-t{font-family:'Fraunces',serif;font-size:17px;color:var(--tinta);margin-bottom:6px}
.vazio-d{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto}
.spin{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:sp .7s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
.spin.esc{border-color:var(--linha);border-top-color:var(--oliva)}
.toast{
  position:fixed;bottom:calc(90px + env(safe-area-inset-bottom,0px));left:50%;
  transform:translateX(-50%);background:var(--tinta);color:#fff;
  padding:11px 20px;border-radius:99px;font-size:13px;z-index:400;
  box-shadow:var(--sombra-alta);animation:up .3s;max-width:88%;text-align:center;
}
.grat{text-align:center;padding:20px 6px}
.grat-ic{
  width:62px;height:62px;border-radius:50%;background:var(--oliva);color:#fff;
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  animation:pop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(0);opacity:0}}
.grat-t{font-family:'Fraunces',serif;font-size:25px;margin-bottom:11px;line-height:1.2}
.grat-d{font-size:14px;color:var(--tinta-suave);line-height:1.65;margin-bottom:20px}
.grat-l{
  background:var(--papel);border-radius:var(--r);padding:15px;text-align:left;margin-bottom:20px;
}
.grat-li{font-size:13px;padding:4px 0;color:var(--tinta);display:flex;gap:8px}
.grat-li svg{color:var(--oliva);flex-shrink:0;margin-top:2px}
.admin-tag{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;
  background:var(--tinta);color:#fff;font-size:9.5px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.tab{padding:8px 14px;border-radius:99px;font-size:12.5px;font-weight:500;
  border:1px solid var(--linha);color:var(--tinta-suave);white-space:nowrap;background:#fff}
.tab.on{background:var(--oliva);color:#fff;border-color:var(--oliva)}
.ped{padding:14px;border-bottom:1px solid var(--linha);display:flex;gap:12px;align-items:flex-start}
.ped:last-child{border-bottom:none}
.ped-i{flex:1;min-width:0}
.ped-n{font-size:14px;font-weight:500}
.ped-d{font-size:11.5px;color:var(--tinta-suave);margin-top:3px;line-height:1.5}
.ped-v{font-size:15px;font-weight:600;color:var(--oliva);white-space:nowrap}
.badge{padding:2px 8px;border-radius:99px;font-size:9.5px;font-weight:600;
  letter-spacing:.05em;text-transform:uppercase;display:inline-block;margin-top:5px}
.badge.pend{background:#FBF0E4;color:#9A6A2A}
.badge.conf{background:#EAEEE3;color:var(--oliva)}
@media(max-width:360px){.grid{gap:10px}.pres-n{font-size:11.5px}}

/* Telefone: só dígitos, sem DDI. É a identidade do convidado — funciona
   em qualquer celular, ao contrário do uid anônimo (preso ao navegador). */
const soDigitos = t => (t||'').replace(/\D/g,'');
const chaveFone = t => {
  let d = soDigitos(t);
  if(d.startsWith('55') && d.length>11) d = d.slice(2);  // tira DDI
  return d;
};
const foneValido = t => {
  const d = chaveFone(t);
  return d.length===10 || d.length===11;   // DDD + 8 ou 9 dígitos
};
const foneBonito = t => {
  const d = chaveFone(t);
  if(d.length===11) return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
  if(d.length===10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return t;
};
const mascaraFone = t => {
  const d = soDigitos(t).slice(0,11);
  if(d.length<=2) return d;
  if(d.length<=6) return '('+d.slice(0,2)+') '+d.slice(2);
  if(d.length<=10) return '('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);
  return '('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
};

};

};

/* ── BR Code Pix (EMV) ── */
function pixBRCode(valor, txid='***'){
  const f=(id,v)=>id+String(v.length).padStart(2,'0')+v;
  const norm=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 $%*+\-./:]/g,'').toUpperCase();
  const mai=f('00','BR.GOV.BCB.PIX')+f('01',PIX.chave);
  let p='';
  p+=f('00','01');
  p+=f('26',mai);
  p+=f('52','0000');
  p+=f('53','986');
  if(valor>0) p+=f('54',valor.toFixed(2));
  p+=f('58','BR');
  p+=f('59',norm(PIX.nome).slice(0,25));
  p+=f('60',norm(PIX.cidade).slice(0,15));
  p+=f('62',f('05',txid.slice(0,25)));
  p+='6304';
  // CRC16-CCITT
  let crc=0xFFFF;
  for(let i=0;i<p.length;i++){
    crc^=p.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) crc = (crc&0x8000) ? ((crc<<1)^0x1021)&0xFFFF : (crc<<1)&0xFFFF;
  }
  return p+crc.toString(16).toUpperCase().padStart(4,'0');
}

function App(){

  //   URL termina em #noivos  → NÃO cria sessão anônima; mostra o login por e-mail.
  //   Sem #noivos             → convidado entra anônimo, como sempre.
  useEffect(()=>{
    const querNoivos = ()=> location.hash.toLowerCase()==='#noivos';

    // Se um convidado anônimo pediu #noivos, derruba a sessão dele primeiro.
    const u0 = auth.currentUser;
    if(querNoivos() && u0 && u0.isAnonymous) signOut(auth);

    const un = onAuthStateChanged(auth, async u=>{
      // ── ninguém logado ──
      if(!u){
        if(querNoivos()){                 // quer o login dos noivos: não cria anônimo
          setUid(null); setAdmin(false);
          setForcarLogin(true); setEu(false);
          return;
        }
        try{ await signInAnonymously(auth); }
        catch(e){ console.error(e); }
        return;
      }

      // ── convidado anônimo, mas a URL pede noivos: derruba ──
      if(u.isAnonymous && querNoivos()){ await signOut(auth); return; }

      const ehNoivo = NOIVOS_UID.includes(u.uid);

      // ── e-mail que NÃO está na lista de noivos: não é admin, barra ──
      if(!u.isAnonymous && !ehNoivo){
        await signOut(auth);
        setForcarLogin(true); setEu(false);
        return;
      }

      setUid(u.uid);
      setAdmin(ehNoivo);
      setForcarLogin(false);
      if(location.hash) history.replaceState(null,'',location.pathname);

      // A identidade é o TELEFONE, não o uid do navegador.
      // O uid só serve para lembrar quem é neste aparelho.
      const fone = ehNoivo
        ? (CASAMENTO.fones[u.email?.toLowerCase()] || '')
        : localStorage.getItem('jm_fone');

      if(fone){
        const snap = await getDoc(doc(db,C.convidados,fone));
        if(snap.exists()){
          setEu({fone, uid:u.uid, ...snap.data(), noivo:ehNoivo});
          return;
        }
      }

      if(ehNoivo){
        // noivo logou por e-mail: cria/garante a ficha pelo telefone dele
        const nome = (u.email||'').toLowerCase().includes('jessika') ? 'Jessika' : 'Milton';
        const f = CASAMENTO.fones[u.email?.toLowerCase()] || chaveFone(CASAMENTO.whatsapp);
        const dado = {nome, em:serverTimestamp()};
        await setDoc(doc(db,C.convidados,f), dado, {merge:true});
        localStorage.setItem('jm_fone', f);
        setEu({fone:f, uid:u.uid, ...dado, noivo:true});
        return;
      }

      setEu(false);   // convidado novo (ou aparelho novo): vai para o Gate
    });

    // trocar o hash na barra de endereço recarrega o app no modo certo
    const onHash = ()=> location.reload();
    window.addEventListener('hashchange', onHash);
    return ()=>{ un(); window.removeEventListener('hashchange', onHash); };
  },[]);

  useEffect(()=>{
    if(!uid) return;
    const un=[];
    un.push(onSnapshot(collection(db,C.pedidos),s=>
      setPedidos(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.chat),orderBy('em','asc')),s=>
      setMsgs(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.galeria),orderBy('em','desc')),s=>
      setMidias(s.docs.map(d=>({id:d.id,...d.data()})))));
    un.push(onSnapshot(query(collection(db,C.avisos),orderBy('em','desc')),s=>
      setAvisos(s.docs.map(d=>({id:d.id,...d.data()})))));
    return ()=>un.forEach(f=>f());
  },[uid]);

  // Presentes meus que foram confirmados e que eu ainda não vi
  const [avisoConfirmado,setAvisoConfirmado] = useState(null);
  useEffect(()=>{
    if(!eu || !eu.fone) return;
    const meus = pedidos.filter(p=>p.fone===eu.fone && p.status==='confirmado');
    if(!meus.length) return;
    let vistos = [];
    try{ vistos = JSON.parse(localStorage.getItem('jm_vistos')||'[]'); }catch(e){}
    const novos = meus.filter(p=>!vistos.includes(p.id));
    if(novos.length){
      setAvisoConfirmado(novos);
      localStorage.setItem('jm_vistos',
        JSON.stringify([...vistos, ...novos.map(p=>p.id)]));
    }
  },[pedidos, eu]);

  // agregações de presentes
  const dados = useMemo(()=>{
    const confirmados = pedidos.filter(p=>p.status==='confirmado');
    const arrecadado  = confirmados.reduce((s,p)=>s+(p.total||0),0);
    const vezesDadas  = {};   // presente -> nº de pessoas que deram
    const cotasDadas  = {};   // essencial -> nº de cotas já compradas
    confirmados.forEach(p=>(p.itens||[]).forEach(i=>{
      vezesDadas[i.id]=(vezesDadas[i.id]||0)+1;
      if(i.qtd) cotasDadas[i.id]=(cotasDadas[i.id]||0)+i.qtd;
    }));
    return {arrecadado, vezesDadas, cotasDadas, confirmados};
  },[pedidos]);

  if(eu===null) return h('div',{style:{minHeight:'100vh',display:'flex',
    alignItems:'center',justifyContent:'center'}},h('div',{className:'spin esc'}));

  if(eu===false) return h(Gate,{uid,abrirLogin:forcarLogin,
    onEntrar:async(nome,foneTxt)=>{
      const fone = chaveFone(foneTxt);
      const ref  = doc(db,C.convidados,fone);
      const snap = await getDoc(ref);

      if(snap.exists()){
        // Já esteve aqui (talvez em outro aparelho): mantém o nome original,
        // só registra este dispositivo.
        const dado = snap.data();
        await setDoc(ref,{
          uids: [...new Set([...(dado.uids||[]), uid])],
          visto: serverTimestamp()
        },{merge:true});
        localStorage.setItem('jm_fone', fone);
        setEu({fone, uid, ...dado, voltou:true});
      } else {
        const dado = {nome:nome.trim(), uids:[uid], em:serverTimestamp()};
        await setDoc(ref, dado);
        localStorage.setItem('jm_fone', fone);
        setEu({fone, uid, ...dado});
      }
  }});

  const props = {eu,uid,admin,setAdmin,pedidos,msgs,midias,avisos,dados,aviso};

  return h('div',{className:'shell'},
    aba==='casa'  && h(Casa,{...props,setAba}),
    aba==='gift'  && h(Presentes,props),
    aba==='chat'  && h(Chat,props),
    aba==='foto'  && h(Galeria,props),
    aba==='local' && h(Local,props),
    h(Nav,{aba,setAba,nMsgs:msgs.length,nFotos:midias.length}),
    toast && h('div',{className:'toast'},toast),
    avisoConfirmado && h(Confirmado,{
      pedidos:avisoConfirmado,
      fechar:()=>setAvisoConfirmado(null)})
  );
}

function Gate({onEntrar,abrirLogin}){
  const [nome,setNome]=useState('');

  const [login,setLogin]=useState(!!abrirLogin);

  const okFone = foneValido(fone);
  const ok = okNome && okFone;
  useEffect(()=>{ if(abrirLogin) setLogin(true); },[abrirLogin]);

  const go=async()=>{
    if(busy) return;
    if(!okNome){ setErro('Escreva seu nome.'); return; }
    if(!okFone){ setErro('Digite o WhatsApp com DDD.'); return; }
    setErro(''); setBusy(true);
    try{ await onEntrar(nome,fone); }

    h('div',{className:'card',style:{padding:'22px 20px'}},
      h('div',{style:{fontSize:'14px',lineHeight:1.6,color:'var(--tinta-suave)',marginBottom:'20px'}},
        'Que bom ter você aqui. Diga quem é você para entrar.'),
      h('div',{className:'fld'},
        h('label',null,'Seu nome'),
        h('input',{className:'inp',value:nome,autoFocus:true,
          placeholder:'Nome e sobrenome',
          onChange:e=>{setNome(e.target.value);setErro('')},
          onKeyDown:e=>e.key==='Enter'&&go()})),
      h('div',{className:'fld'},
        h('label',null,'WhatsApp'),
        h('input',{className:'inp',value:fone,type:'tel',inputMode:'numeric',
          placeholder:'(15) 99999-9999',
          onChange:e=>{setFone(mascaraFone(e.target.value));setErro('')},
          onKeyDown:e=>e.key==='Enter'&&go()}),
        h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',
          marginTop:'6px',lineHeight:1.5}},
          'É assim que a gente te reconhece se você abrir o app noutro celular.')),
      erro && h('div',{style:{fontSize:'12.5px',color:'var(--erro)',
        marginBottom:'12px',lineHeight:1.5}},erro),
      h('button',{className:'btn btn-p',disabled:busy,onClick:go},

    ),
    h('div',{style:{textAlign:'center',marginTop:'22px'}},
      h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',lineHeight:1.6}},
        'Villa Vezzane · Mairiporã, SP'),
      h('button',{style:{fontSize:'11px',color:'var(--linha)',letterSpacing:'.1em',
        marginTop:'14px',padding:'6px'},
        onClick:()=>setLogin(true)},'· · ·')),

    login && h(LoginNoivos,{fechar:()=>setLogin(false)})
  );
}

/* ═════════════ SELETOR DE COTAS ═════════════ */
function SeletorCota({ess,dadas,atual,fechar,confirmar}){
  const sobra = ess.cotas - dadas;
  const [q,setQ] = useState(atual || 1);
  const clamp = n => Math.max(0, Math.min(sobra, n));
  const total = ess.cota * q;
  const pctViagem = (total / ALVO_LUA_MEL) * 100;

  const atalhos = [1,2,4,sobra].filter((v,i,a)=>v>0 && v<=sobra && a.indexOf(v)===i);

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},ess.nome),
        h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),
      h('div',{className:'mod-b'},
        h('img',{src:ess.img,alt:'',
          style:{width:'100%',aspectRatio:'16/9',objectFit:'cover',
            borderRadius:'11px',marginBottom:'16px'}}),

        h('p',{style:{fontSize:'13.5px',color:'var(--tinta-suave)',lineHeight:1.6,
          marginBottom:'18px'}},
          ess.sub,'. Custa ',
          h('b',{style:{color:'var(--tinta)'}},brl(ess.cota*ess.cotas)),
          ' no total, dividido em ',ess.cotas,' cotas de ',
          h('b',{style:{color:'var(--tinta)'}},brl(ess.cota)),'.'),

        h('div',{className:'tot-box',style:{marginBottom:'18px'}},
          h('div',{className:'ess-bar',style:{height:'7px'}},
            h('div',{className:'ess-fill',
              style:{width:((dadas+q)/ess.cotas*100)+'%'}})),
          h('div',{style:{display:'flex',justifyContent:'space-between',
            fontSize:'11.5px',color:'var(--tinta-suave)',marginTop:'9px'}},
            h('span',null,dadas+' já presenteadas'),
            h('span',null,sobra+' ainda faltam'))),

        h('div',{className:'eyebrow',style:{marginBottom:'10px'}},'Quantas cotas você quer dar?'),

        h('div',{className:'contador'},
          h('button',{className:'cont-b',disabled:q<=1,
            onClick:()=>setQ(clamp(q-1))},'−'),
          h('div',{className:'cont-v'},
            h('div',{className:'cont-n mono'},q),
            h('div',{className:'cont-l'},q===1?'cota':'cotas')),
          h('button',{className:'cont-b',disabled:q>=sobra,
            onClick:()=>setQ(clamp(q+1))},'+')),

        atalhos.length>1 && h('div',{style:{display:'flex',gap:'7px',marginTop:'12px',
          justifyContent:'center',flexWrap:'wrap'}},
          atalhos.map(v=>h('button',{key:v,
            className:'tab'+(q===v?' on':''),
            onClick:()=>setQ(v)},
            v===sobra && sobra>1 ? 'Todas ('+v+')' : v+(v===1?' cota':' cotas')))),

        h('div',{className:'tot-f',style:{marginTop:'20px',paddingTop:'16px'}},
          h('span',null,'Você contribui com'),
          h('b',{className:'mono'},brl(total))),
        h('div',{style:{fontSize:'11.5px',color:'var(--oliva)',textAlign:'right',
          marginTop:'-6px',marginBottom:'18px'}},
          pctViagem.toFixed(1)+'% da viagem inteira'),

        h('button',{className:'btn btn-p',onClick:()=>confirmar(q)},
          h(Ic,{d:I.ok,s:16}),
          atual ? 'Atualizar para '+brl(total) : 'Adicionar '+brl(total)),
        atual>0 && h('button',{className:'btn',style:{marginTop:'8px',
          color:'var(--erro)',fontSize:'13px'},
          onClick:()=>confirmar(0)},'Remover da lista')
      )));
}

/* ═════════════ PAGAR ═════════════ */
function Pagar({sel,total,eu,uid,fechar,concluir,aviso}){
  const [meio,setMeio] = useState(null);
  const [busy,setBusy] = useState(false);
  const [qr,setQr]     = useState('');
  const cv = useRef(null);
  const codigo = useMemo(()=>pixBRCode(total,'JM'+Date.now().toString(36).toUpperCase()),[total]);

  useEffect(()=>{
    if(meio!=='pix'||!cv.current) return;
    QRCode.toCanvas(cv.current,codigo,{width:212,margin:1,
      color:{dark:'#33261E',light:'#FFFFFF'}},e=>e&&console.error(e));
  },[meio,codigo]);

  const salvar = async (forma) => {
    setBusy(true);
    try{
      const ref = await addDoc(collection(db,C.pedidos),{
        uid, fone:eu.fone, nome:eu.nome,
        itens: sel.map(p=>{
          const it = {id:p.id, nome:p.nome, valor:p.valor};
          if(p.qtd){ it.qtd = p.qtd; it.cota = p.cota; }   // essencial: nº de cotas
          return it;
        }),
        total, forma, status:'pendente', em:serverTimestamp()
      });
      concluir({id:ref.id,itens:sel,total,forma});
    }catch(e){
      console.error(e);
      aviso('Não foi possível registrar. Tente de novo.');
      setBusy(false);
    }
  };

  const linkCartao = INFINITYPAY.aberto || INFINITYPAY.porValor[total] || '';

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},meio==='pix'?'Pagar com Pix':meio==='cartao'?'Pagar com cartão':'Seu presente'),
        h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),

      h('div',{className:'mod-b'},
        h('div',{className:'tot-box'},
          sel.map(p=>h('div',{key:p.id,className:'tot-l'},
            h('span',null,p.nome,
              p.qtd && h('span',{style:{color:'var(--tinta-suave)',fontSize:'11px'}},
                ' · '+p.qtd+(p.qtd===1?' cota':' cotas'))),
            h('b',{className:'mono'},brl(p.valor)))),
          h('div',{className:'tot-f'},
            h('span',null,'Total'),
            h('b',{className:'mono'},brl(total)))),

        !meio && h('div',null,
          h('button',{className:'btn btn-p',style:{marginBottom:'10px'},
            onClick:()=>setMeio('pix')},
            h(Ic,{d:I.copy,s:17}),'Pagar com Pix'),
          h('button',{className:'btn btn-o',onClick:()=>setMeio('cartao')},
            h(Ic,{d:I.card,s:17}),'Pagar com cartão de crédito'),
          h('p',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',textAlign:'center',
            marginTop:'16px',lineHeight:1.6}},
            'O Pix cai direto na conta e não tem taxa nenhuma.')),

        meio==='pix' && h('div',null,
          h('div',{className:'qr-box'},h('canvas',{ref:cv})),
          h('div',{className:'eyebrow',style:{marginBottom:'7px'}},'Pix copia e cola'),
          h('div',{className:'pix-code'},codigo),
          h('button',{className:'btn btn-g',style:{marginBottom:'10px'},
            onClick:()=>{
              navigator.clipboard.writeText(codigo)
                .then(()=>aviso('Código copiado'))
                .catch(()=>aviso('Selecione o código e copie manualmente'));
            }},
            h(Ic,{d:I.copy,s:16}),'Copiar código Pix'),
          h('div',{style:{fontSize:'11.5px',color:'var(--tinta-suave)',lineHeight:1.6,
            padding:'12px 14px',background:'var(--papel)',borderRadius:'10px',marginBottom:'14px'}},
            h('b',{style:{color:'var(--tinta)'}},'Como fazer: '),
            'abra o app do seu banco, escolha Pix → Ler QR Code (ou Pix Copia e Cola), ',
            'confirme o valor e finalize. Depois volte aqui e toque no botão abaixo.'),
          h('button',{className:'btn btn-t',disabled:busy,onClick:()=>salvar('pix')},
            busy ? h('div',{className:'spin'}) : [h(Ic,{key:'i',d:I.ok,s:17}),'Já fiz o Pix']),

/* ═════════════ CHAT ═════════════ */
function Chat({eu,uid,msgs,avisos,admin,setAdmin,aviso}){
  const [txt,setTxt]=useState('');
  const [busy,setBusy]=useState(false);
  const fim=useRef(null);

  useEffect(()=>{fim.current?.scrollIntoView({behavior:'smooth'})},[msgs.length]);

  const enviar=async()=>{
    const t=txt.trim();
    if(!t||busy) return;
    setBusy(true); setTxt('');
    try{
      await addDoc(collection(db,C.chat),{
        uid, nome:eu.nome, txt:t.slice(0,600), em:serverTimestamp()
      });
    }catch(e){ aviso('Não foi enviado. Tente de novo.'); setTxt(t); }
    setBusy(false);
  };

  const apagar=async id=>{
    if(!confirm('Apagar esta mensagem para todos?')) return;
    await deleteDoc(doc(db,C.chat,id));
  };

  return h('div',{className:'chat-w'},
    avisos.length>0 && h('div',{className:'avisos'},
      avisos.slice(0,2).map(a=>h('div',{key:a.id,className:'aviso'},
        h('div',{className:'aviso-ic'},h(Ic,{d:I.info,s:17})),
        h('div',{className:'aviso-t'},
          h('b',null,'Recado dos noivos'),
          a.txt),
        admin && h('button',{className:'del-m',style:{opacity:1},
          onClick:()=>deleteDoc(doc(db,C.avisos,a.id))},h(Ic,{d:I.lixo,s:14}))))),

    h('div',{className:'msgs'},
      msgs.length===0 && h('div',{className:'vazio'},
        h('div',{className:'vazio-ic'},h(Ic,{d:I.chat,s:38})),
        h('div',{className:'vazio-t'},'Ninguém falou nada ainda'),
        h('div',{className:'vazio-d'},'Este é o espaço dos convidados. Diga oi, combine carona, pergunte o que quiser.')),

      msgs.map(m=>{
        const meu = m.uid===uid;
        return h('div',{key:m.id,className:'msg'+(meu?' eu':'')},
          !meu && h('div',{className:'av',style:{background:corDe(m.nome)}},iniciais(m.nome)),
          h('div',{className:'bub'},
            !meu && h('div',{className:'bub-n'},m.nome),
            h('div',null,m.txt),
            h('div',{className:'bub-h mono'},hora(m.em))),
          (admin||meu) && h('button',{className:'del-m',onClick:()=>apagar(m.id)},
            h(Ic,{d:I.lixo,s:13})));
      }),
      h('div',{ref:fim})),

    h('div',{className:'chat-in'},
      h('textarea',{className:'inp',rows:1,value:txt,maxLength:600,
        placeholder:'Escreva uma mensagem',
        onChange:e=>{
          setTxt(e.target.value);
          e.target.style.height='auto';
          e.target.style.height=Math.min(e.target.scrollHeight,96)+'px';
        },
        onKeyDown:e=>{
          if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();
            e.target.style.height='auto';}
        }}),
      h('button',{className:'chat-s',disabled:!txt.trim()||busy,onClick:enviar},
        busy?h('div',{className:'spin'}):h(Ic,{d:I.send,s:17})))
  );
}

/* ═════════════ GALERIA ═════════════ */
function Galeria({eu,uid,midias,admin,aviso}){
  const [busy,setBusy]=useState(false);
  const [prog,setProg]=useState(0);
  const [lb,setLb]=useState(null);
  const inp=useRef(null);

  const configurado = CLOUDINARY.cloudName && CLOUDINARY.uploadPreset;

  const subir = async e => {
    const arqs=[...e.target.files];
    if(!arqs.length) return;
    if(!configurado){ aviso('Álbum ainda não está ativo.'); return; }
    setBusy(true); setProg(0);
    let n=0;
    for(const a of arqs){
      try{
        const fd=new FormData();
        fd.append('file',a);
        fd.append('upload_preset',CLOUDINARY.uploadPreset);
        const tipo = a.type.startsWith('video')?'video':'image';
        const r=await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/${tipo}/upload`,
          {method:'POST',body:fd});
        const j=await r.json();
        if(!j.secure_url) throw new Error(j.error?.message||'upload falhou');
        await addDoc(collection(db,C.galeria),{
          uid, nome:eu.nome, url:j.secure_url,
          thumb: tipo==='video'
            ? j.secure_url.replace('/upload/','/upload/so_0,w_400,h_400,c_fill/').replace(/\.\w+$/,'.jpg')
            : j.secure_url.replace('/upload/','/upload/w_400,h_400,c_fill,q_auto/'),
          tipo, pid:j.public_id, em:serverTimestamp()
        });
      }catch(err){ console.error(err); }
      n++; setProg(Math.round(n/arqs.length*100));
    }
    setBusy(false); setProg(0);
    e.target.value='';
    aviso(arqs.length===1?'Foto no álbum':arqs.length+' arquivos no álbum');
  };

  const apagar=async m=>{
    if(!confirm('Remover do álbum?')) return;
    await deleteDoc(doc(db,C.galeria,m.id));
    setLb(null);
  };

  return h('div',null,
    h('div',{className:'pad'},
      h('div',{className:'sec'},
        h('div',{className:'eyebrow',style:{marginBottom:'8px'}},'Álbum coletivo'),
        h('h2',{className:'display sec-t'},'O casamento pelos seus olhos.'),
        h('p',{className:'sec-d'},
          'Tire fotos, grave vídeos, e mande tudo para cá. Todo mundo vê na hora — ',
          'e nós ficamos com o registro completo do nosso dia.')),

      h('input',{ref:inp,type:'file',accept:'image/*,video/*',multiple:true,
        style:{display:'none'},onChange:subir}),

      h('button',{className:'up-btn',disabled:busy,onClick:()=>inp.current.click()},
        busy
          ? [h('div',{key:'s',className:'spin esc'}),
             h('span',{key:'t'},'Enviando… '+prog+'%')]
          : [h(Ic,{key:'i',d:I.up,s:20}),
             h('span',{key:'t'},'Adicionar fotos e vídeos')])
    ),

    midias.length===0
      ? h('div',{className:'vazio'},
          h('div',{className:'vazio-ic'},h(Ic,{d:I.foto,s:38})),
          h('div',{className:'vazio-t'},'O álbum começa com você'),
          h('div',{className:'vazio-d'},'Nada aqui ainda. A primeira foto pode ser a sua.'))
      : h('div',{className:'gal-grid'},
          midias.map(m=>h('div',{key:m.id,className:'gal-cell',onClick:()=>setLb(m)},
            h('img',{className:'gal-i',src:m.thumb||m.url,alt:'',loading:'lazy'}),
            m.tipo==='video' && h('div',{className:'gal-play'},h(Ic,{d:I.play,s:24,f:'currentColor'})),
            h('div',{className:'gal-au'},m.nome.split(/\s+/)[0])))),

    h('div',{style:{height:'40px'}}),

    lb && h('div',{className:'lb',onClick:e=>e.target===e.currentTarget&&setLb(null)},
      h('button',{className:'lb-x',onClick:()=>setLb(null)},h(Ic,{d:I.x,s:17})),
      lb.tipo==='video'
        ? h('video',{src:lb.url,controls:true,autoPlay:true,playsInline:true})
        : h('img',{src:lb.url,alt:''}),
      h('div',{className:'lb-i'},
        'Enviado por '+lb.nome,
        (admin||lb.uid===uid) && h('button',{
          style:{display:'block',margin:'10px auto 0',color:'#E08A6E',fontSize:'12px'},
          onClick:()=>apagar(lb)},'Remover')))
  );
}

/* ═════════════ PAINEL ADMIN ═════════════ */
function Painel({pedidos,dados,fechar,aviso}){
  const [tab,setTab]=useState('pendente');
  const [novoAviso,setNovoAviso]=useState('');

  const lista = [...pedidos]
    .filter(p=>tab==='todos'||p.status===tab)
    .sort((a,b)=>(b.em?.seconds||0)-(a.em?.seconds||0));

  const mudar=async(p,st)=>{
    try{
      await updateDoc(doc(db,C.pedidos,p.id),{status:st});
      aviso(st==='confirmado'?'Presente confirmado':'Marcado como pendente');
    }catch(e){ aviso('Não deu para salvar. Verifique a conexão.'); }
  };

  const publicar=async()=>{
    const t=novoAviso.trim();
    if(!t) return;
    try{
      await addDoc(collection(db,C.avisos),{txt:t,em:serverTimestamp()});
      setNovoAviso(''); aviso('Recado publicado no chat');
    }catch(e){ aviso('Não deu para publicar. Verifique a conexão.'); }
  };

  const pend = pedidos.filter(p=>p.status==='pendente');
  const pendTotal = pend.reduce((s,p)=>s+(p.total||0),0);

  return h('div',{className:'ov',onClick:e=>e.target===e.currentTarget&&fechar()},
    h('div',{className:'mod'},
      h('div',{className:'grab'}),
      h('div',{className:'mod-h'},
        h('div',{className:'mod-t'},'Painel dos noivos'),
        h('button',{className:'mod-x',onClick:fechar},h(Ic,{d:I.x,s:16}))),

      h('div',{className:'mod-b'},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'11px',marginBottom:'22px'}},
          h('div',{className:'card',style:{padding:'15px'}},
            h('div',{className:'eyebrow'},'Confirmado'),
            h('div',{className:'mono',style:{fontSize:'19px',fontWeight:600,
              color:'var(--oliva)',marginTop:'5px'}},brl(dados.arrecadado))),
          h('div',{className:'card',style:{padding:'15px'}},
            h('div',{className:'eyebrow'},'Aguardando'),
            h('div',{className:'mono',style:{fontSize:'19px',fontWeight:600,
              color:'var(--terracota)',marginTop:'5px'}},brl(pendTotal)))),

        h('div',{className:'card',style:{padding:'16px',marginBottom:'22px'}},
          h('div',{className:'eyebrow',style:{marginBottom:'9px'}},'Publicar recado no chat'),
          h('textarea',{className:'inp',rows:2,value:novoAviso,
            placeholder:'Ex: O portão abre às 15h. Estacionamento gratuito no local.',
            onChange:e=>setNovoAviso(e.target.value),
            style:{marginBottom:'10px'}}),
          h('button',{className:'btn btn-p btn-sm',disabled:!novoAviso.trim(),
            onClick:publicar,style:{width:'100%'}},'Publicar para todos')),

        h('div',{className:'tabs'},
          [['pendente','Aguardando '+pend.length],
           ['confirmado','Confirmados'],
           ['todos','Todos']].map(([k,l])=>
            h('button',{key:k,className:'tab'+(tab===k?' on':''),
              onClick:()=>setTab(k)},l))),

        h('div',{className:'card'},
          lista.length===0
            ? h('div',{style:{padding:'34px 20px',textAlign:'center',
                color:'var(--tinta-suave)',fontSize:'13px'}},'Nada aqui.')
            : lista.map(p=>h('div',{key:p.id,className:'ped'},
                h('div',{className:'ped-i'},
                  h('div',{className:'ped-n'},p.nome),
                  p.fone && h('a',{href:'https://wa.me/55'+p.fone,
                    target:'_blank',rel:'noopener',
                    onClick:e=>e.stopPropagation(),
                    style:{fontSize:'11.5px',color:'var(--terracota)',
                      textDecoration:'none',fontWeight:500}},
                    foneBonito(p.fone)),
                  h('div',{className:'ped-d'},
                    (p.itens||[]).map(i=>
                      i.qtd ? i.nome+' ('+i.qtd+'x)' : i.nome).join(' · ')),
                  h('div',{className:'badge '+(p.status==='confirmado'?'conf':'pend')},
                    (p.forma==='pix'?'Pix':'Cartão')+' · '+
                    (p.status==='confirmado'?'Confirmado':'Aguardando'))),
                h('div',{style:{textAlign:'right',flexShrink:0}},
                  h('div',{className:'ped-v mono'},brl(p.total)),
                  h('button',{className:'btn btn-sm '+(p.status==='confirmado'?'btn-o':'btn-p'),
                    style:{marginTop:'7px',fontSize:'11px',padding:'6px 11px'},
                    onClick:()=>mudar(p,p.status==='confirmado'?'pendente':'confirmado')},
                    p.status==='confirmado'?'Desfazer':'Confirmar'))))),
        h('div',{style:{height:'20px'}}))
    ));
}

/* ═════════════ NAV ═════════════ */
function Nav({aba,setAba,nMsgs,nFotos}){
  const abas=[
    ['casa', I.casa, 'Início'],
    ['gift', I.gift, 'Presentes'],
    ['chat', I.chat, 'Conversa'],
    ['foto', I.foto, 'Álbum'],
    ['local',I.pin,  'Local']
  ];
  return h('nav',{className:'nav'},
    abas.map(([k,ic,l])=>
      h('button',{key:k,className:'nav-b'+(aba===k?' on':''),onClick:()=>setAba(k)},
        h(Ic,{d:ic,s:20}),
        h('span',null,l))));
}
